name: Build

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        uses: diplodoc-platform/docs-build-static-action@v1
        with:
          src-root: ./
          build-root: ./_site

      - name: Add root redirect
        run: |
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="ru">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=./ru/Smartbot_Pro.html">
              <title>Smartbot Pro</title>
              <script>window.location.replace('./ru/Smartbot_Pro.html');</script>
            </head>
            <body>
              <a href="./ru/Smartbot_Pro.html">Smartbot Pro</a>
            </body>
          </html>
          EOF

      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
